services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: "mysql://root:123456@mariadb:3306/fuxiaochen"
        NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
    image: fuxiaochen:latest
    container_name: fuxiaochen
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_HOST=mariadb
      - DATABASE_PORT=3306
      - DATABASE_USER=root
      - DATABASE_PASSWORD=123456
      - DATABASE_NAME=fuxiaochen
      - DATABASE_URL=mysql://root:123456@mariadb:3306/fuxiaochen
    env_file:
      - .env
    networks:
      - fuxiaochen-network
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:lts
    container_name: mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=123456
      - MARIADB_DATABASE=fuxiaochen
      - TZ=Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./prisma/migrations/20260224135243_init/migration.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - ./docker/init-prisma-migrations.sql:/docker-entrypoint-initdb.d/002-prisma-migrations.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - fuxiaochen-network

networks:
  fuxiaochen-network:
    driver: bridge

volumes:
  mysql_data:
